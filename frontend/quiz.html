<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathAI - Diagnostic Test</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard-container" style="justify-content: center; align-items: center; padding: 40px;">
        <div class="topic-card" style="max-width: 600px; width: 100%; cursor: default;">
            <div style="margin-bottom: 20px;">
                <span class="topic-status status-review">Assessment In Progress</span>
                <h2 style="margin-top: 10px;">Diagnostic Quiz: Question 1 of 5</h2>
                <p class="progress-text" style="margin-top: 5px;">This helps the AI evaluate your starting DSA skill level.</p>
            </div>
            
            <div style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;">
                <p style="font-size: 16px; font-weight: 500; line-height: 1.6;">What is the worst-case time complexity of searching for an element in a balanced Binary Search Tree (BST)?</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;">
                <button class="nav-item" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); justify-content: flex-start; text-align: left; width: 100%;">O(1)</button>
                <button class="nav-item" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); justify-content: flex-start; text-align: left; width: 100%;">O(log n)</button>
                <button class="nav-item" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); justify-content: flex-start; text-align: left; width: 100%;">O(n)</button>
                <button class="nav-item" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); justify-content: flex-start; text-align: left; width: 100%;">O(n log n)</button>
            </div>

            <button class="nav-item active" style="justify-content: center; width: 100%; border: none; font-weight: 600; cursor: pointer;">Submit Answer &rarr;</button>
        </div>
    </div>
</body>
</html>
