<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="dashboard-container">

                <span class="logo-icon">🧠</span> PathAI
            </div>
            <p class="sidebar-subtitle">DSA Learning Companion</p>

            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item active">📚 My Learning Path</a>
